name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        required: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Determine version
        id: determine_version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            raw_version="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            raw_version="${GITHUB_REF_NAME}"
          else
            raw_version="$(node -p 'require("./package.json").version')"
          fi

          version="${raw_version#v}"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build default bundle
        run: npm run build

      - name: Package dist.zip
        run: |
          rm -f dist.zip
          zip -rq dist.zip dist

      - name: Build Nezha v0 bundle
        run: npm run build:v0

      - name: Package v0-dist.zip
        run: |
          rm -f v0-dist.zip
          zip -rq v0-dist.zip dist

      - name: Build Nezha v0 /aobobo/ subdirectory bundle
        run: npm run build:aobobo

      - name: Package v0-aobobo.zip
        run: |
          rm -f v0-aobobo.zip
          zip -rq v0-aobobo.zip dist

      - name: Generate release notes
        id: release_notes
        run: |
          echo "#### Changes" > release_notes.md
          git log -20 --pretty=format:"- %s" >> release_notes.md
          echo -e "\n-----------\n默认构建（自动探测哪吒版本）请下载 dist.zip\n哪吒 v0 请下载 v0-dist.zip\n哪吒 v0 /aobobo/ 子目录需求请下载 v0-aobobo.zip" >> release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.determine_version.outputs.tag }}
          name: Release ${{ steps.determine_version.outputs.tag }}
          body_path: release_notes.md
          draft: true
          files: |
            dist.zip
            v0-dist.zip
            v0-aobobo.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
